<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoho Cliq 2026 Product Tour</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0f1320;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
  .bgdrop{position:fixed;inset:0;z-index:0;background:#0f1320 url('cliq_home.png') center/cover no-repeat;filter:blur(11px);transform:scale(1)}
  .scrim{position:fixed;inset:0;z-index:1;background:rgba(10,14,25,.42)}
  .modal{width:min(1180px,96vw);height:min(760px,94vh);background:
      radial-gradient(120% 90% at 0% 0%, #ece9ff 0%, #f3f1fb 42%, #eaf5ee 100%);
    border-radius:30px;padding:24px 28px 0;position:relative;z-index:2;box-shadow:0 30px 80px rgba(0,0,0,.5);
    display:flex;flex-direction:column;overflow:hidden}
  #stage{flex:1;min-height:0;overflow-y:auto;scrollbar-gutter:stable}
  .badge{position:absolute;top:18px;left:30px;font-weight:800;font-size:22px;color:#4f5bff;display:flex;align-items:baseline;gap:8px}
  .badge small{font-size:14px;color:#8a92a6;font-weight:600}
  .close{position:absolute;top:18px;right:18px;width:40px;height:40px;border-radius:50%;
    background:#fff;border:1px solid #e7e9f0;font-size:20px;color:#6b7385;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.08)}
  .reopen{position:fixed;top:14px;right:14px;z-index:3;display:none;background:#fff;border:1px solid #e7e9f0;
    border-radius:12px;padding:10px 16px;font-weight:700;font-size:13.5px;color:#4f5bff;cursor:pointer;
    box-shadow:0 8px 24px rgba(0,0,0,.28);align-items:center;gap:7px}
  .reopen i{width:8px;height:8px;border-radius:50%;background:#e2410e;display:inline-block;animation:livepulse 1.6s ease-in-out infinite}

  /* persistent progress pill */
  .prog{position:absolute;top:20px;right:72px;background:#fff;border:1px solid #e7e9f0;border-radius:12px;
    padding:7px 13px;box-shadow:0 4px 14px rgba(0,0,0,.06);text-align:left;z-index:5}
  .prog span{font-size:11.5px;font-weight:700;color:#3f4658}
  .prog span b{color:#4f5bff}
  .pgbar{width:108px;height:5px;border-radius:4px;background:#eef0f6;margin-top:5px;overflow:hidden}
  .pgbar i{display:block;height:100%;width:0;border-radius:4px;background:linear-gradient(90deg,#4f5bff,#8a3ffd);transition:width .45s ease}

  .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;margin-top:46px;grid-auto-rows:158px}
  .card{background:#fff;border-radius:18px;border:1px solid rgba(0,0,0,.04);
    box-shadow:0 10px 30px rgba(28,36,60,.08);padding:16px 16px 0;overflow:hidden;display:flex;flex-direction:column;
    position:relative;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
  .card:hover{transform:translateY(-4px);box-shadow:0 18px 44px rgba(28,36,60,.16)}
  .card:hover .go{opacity:1}
  .chead{padding-bottom:10px;border-bottom:1px solid #eef0f6}
  .card h3{font-size:16px;color:#1d2433;font-weight:700;line-height:1.2;padding-right:34px}
  .card .sub{font-size:11.5px;color:#8a92a6;font-weight:600;margin-top:3px;text-transform:uppercase;letter-spacing:.4px}
  .tagchip{display:inline-block;font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    background:#fff3e8;color:#e2410e;border:1px solid #f4c9a8;border-radius:7px;padding:2px 7px;margin-left:6px;vertical-align:middle}
  .go{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;background:#eef1fb;color:#4f5bff;
    display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;opacity:0;transition:opacity .18s ease}
  .seen{position:absolute;top:14px;right:46px;width:18px;height:18px;border-radius:50%;background:#46b97e;color:#fff;
    font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;z-index:3}
  .shot{position:relative;width:calc(100% + 32px);margin:12px -16px 0;flex:1;min-height:70px;background:#f4f6fb}
  .shot img{width:100%;height:100%;object-fit:contain;object-position:center;display:block;padding:6px}
  .ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:5px;color:#9aa3b8;text-align:center;padding:12px;
    background:repeating-linear-gradient(45deg,#f4f6fb,#f4f6fb 12px,#eef1f8 12px,#eef1f8 24px)}
  .ph b{font-size:12.5px;color:#6b7385} .ph span{font-size:11px;line-height:1.35}

  /* ---- live demos ---- */
  .demo{position:relative;width:calc(100% + 32px);margin:12px -16px 0;flex:1;background:#f7f8fc;
    padding:14px;cursor:default;overflow:hidden;text-align:left}
  .dshot .demo{width:100%;height:100%;margin:0;border-radius:17px}
  .demo-live{position:absolute;top:9px;right:12px;font-size:10px;font-weight:800;letter-spacing:.5px;color:#d84b6b;z-index:2;
    animation:livepulse 1.6s ease-in-out infinite}
  @keyframes livepulse{0%,100%{opacity:1}50%{opacity:.45}}
  .demo input{width:100%;border:1.5px solid #dfe3ee;border-radius:10px;padding:9px 12px;font-size:12.5px;outline:none;
    background:#fff;color:#1d2433;margin-top:14px}
  .demo input:focus{border-color:#4f5bff}
  .demo-chips{margin-top:8px}
  .demo-chips span{display:inline-block;font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:8px;
    background:#eef1fb;color:#4f5bff;margin:0 5px 5px 0;cursor:pointer;border:1px solid transparent}
  .demo-chips span:hover{border-color:#4f5bff}
  .dres{background:#fff;border:1px solid #eef0f6;border-radius:9px;padding:7px 10px;margin-top:7px;font-size:11.5px;
    color:#3f4658;line-height:1.4;animation:dfade .25s ease}
  .dres b{color:#1d2433}
  .dres .rtag{font-size:9.5px;font-weight:700;background:#eef1fb;color:#5560a8;border-radius:6px;padding:2px 6px;margin-left:5px}
  .demo-bub{display:inline-block;background:#fff;border:1px solid #e7e9f0;border-radius:12px;border-bottom-left-radius:4px;
    padding:8px 12px;font-size:12px;color:#3f4658;margin-top:16px}
  .demo-bub.out{background:#4f5bff;color:#fff;border:none;border-radius:12px;border-bottom-right-radius:4px;
    display:block;margin:10px 0 0 auto;width:fit-content;animation:dfade .3s ease}
  .demo-note{font-size:10.5px;font-weight:700;color:#46b97e;text-align:right;margin-top:6px;animation:dfade .4s ease}
  .demo-qr{margin-top:12px}
  .demo-qr span{display:inline-block;font-size:11.5px;font-weight:700;padding:7px 12px;border-radius:16px;
    background:#eaf0ff;color:#3b6cf6;border:1px solid #c9d2ff;margin:0 6px 6px 0;cursor:pointer;transition:transform .15s ease}
  .demo-qr span:hover{transform:scale(1.06);background:#dbe6ff}
  .demo-hint{font-size:10.5px;color:#9aa3b8;margin-top:4px}
  .capframe{background:#1d2433;border-radius:12px;height:calc(100% - 30px);min-height:120px;position:relative;margin-top:16px;overflow:hidden}
  .capavs{display:flex;gap:10px;padding:14px}
  .capavs i{width:38px;height:38px;border-radius:50%;background:#39415c}
  .capavs i:nth-child(1){background:linear-gradient(135deg,#5b6ee1,#39415c)}
  .capbar{position:absolute;left:12px;right:12px;bottom:12px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;
    padding:8px 11px;border-radius:9px;min-height:32px;line-height:1.45}

  /* ---- feature detail view ---- */
  .detail{margin-top:46px;min-height:0;display:flex;flex-direction:column;animation:dfade .3s ease}
  @keyframes dfade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .dback{align-self:flex-start;background:#fff;border:1px solid #cfd5e6;color:#3f4658;border-radius:11px;
    padding:9px 16px;font-size:13.5px;font-weight:600;cursor:pointer;margin-bottom:18px}
  .dback:hover{border-color:#4f5bff;color:#4f5bff}
  .dwrap{display:grid;grid-template-columns:1.35fr 1fr;gap:30px;flex:1;align-items:stretch;padding-bottom:10px}
  .dshot{position:relative;background:#fff;border:1px solid #eef0f6;border-radius:18px;overflow:hidden;
    box-shadow:0 16px 40px rgba(28,36,60,.10);min-height:340px}
  .dshot img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:14px}
  .dinfo{display:flex;flex-direction:column;justify-content:center}
  .dtags{display:flex;gap:8px;margin-bottom:14px}
  .dtag{display:inline-flex;font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
    background:#eef1fb;color:#4f5bff;border-radius:8px;padding:5px 10px}
  .dtag.warn{background:#fff3e8;color:#e2410e}
  .dinfo h2{font-size:28px;font-weight:800;color:#10142a;line-height:1.12;letter-spacing:-.5px;margin-bottom:12px}
  .dinfo p{font-size:15.5px;color:#3f4658;line-height:1.6;max-width:420px}
  .dnote{margin-top:16px;font-size:13px;color:#6b7385;background:#f4f6fb;border:1px solid #e7e9f0;border-radius:10px;padding:10px 14px;max-width:420px;line-height:1.5}
  .dbtns{display:flex;gap:12px;margin-top:24px}
  .dbtns a{padding:13px 22px;border-radius:12px;font-weight:700;font-size:14.5px;text-decoration:none}
  .dbtns .primary{background:#4f5bff;color:#fff}
  .dbtns .ghost{background:#fff;border:1px solid #cfd5e6;color:#3f4658;font-weight:600}
  .dnav{display:flex;gap:8px;margin-top:22px}
  .dnav button{background:#fff;border:1px solid #e2e6f1;border-radius:10px;padding:8px 13px;font-size:12.5px;
    font-weight:600;color:#6b7385;cursor:pointer}
  .dnav button:hover{color:#4f5bff;border-color:#c9d2ff}
  @media(max-width:880px){.dwrap{grid-template-columns:1fr}.dshot{min-height:220px}}

  /* welcome + closing */
  .center{margin-top:46px;min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 30px}
  .center h1{font-size:60px;font-weight:800;line-height:1;background:linear-gradient(90deg,#4f5bff,#8a3ffd);
    -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:18px}
  .center p{font-size:17px;color:#3f4658;max-width:600px;line-height:1.55}
  .progress{margin-top:26px;background:#fff;border:1px solid #e7e9f0;border-radius:14px;padding:14px 22px;
    box-shadow:0 6px 18px rgba(28,36,60,.07);font-size:14px;color:#3f4658;font-weight:600}
  .progress b{color:#4f5bff}
  .pbar{width:260px;height:7px;border-radius:5px;background:#eef0f6;margin-top:10px;overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:5px;background:linear-gradient(90deg,#4f5bff,#8a3ffd);transition:width .5s ease}
  .pills{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:28px}
  .pill{background:#fff;border:1px solid #e7e9f0;border-radius:14px;padding:12px 18px;font-weight:600;color:#3f4658;font-size:14px;box-shadow:0 6px 18px rgba(28,36,60,.07)}
  .ctaBtns{display:flex;gap:14px;margin-top:30px}
  .ctaBtns a{padding:14px 26px;border-radius:14px;font-weight:700;font-size:15px;text-decoration:none}
  .ctaBtns .primary{background:#4f5bff;color:#fff} .ctaBtns .ghost{background:#fff;border:1px solid #cfd5e6;color:#3f4658}

  /* ---- announcement (slide 1) ---- */
  .an-head{text-align:center;max-width:880px;margin:26px auto 18px}
  .an-kick{font-size:22px;font-weight:800;background:linear-gradient(90deg,#3aa0ff,#7a5cff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .an-h1{font-size:46px;font-weight:850;color:#10142a;letter-spacing:-1px;line-height:1;margin:6px 0 12px}
  .an-h1 span{background:linear-gradient(90deg,#4f5bff,#8a3ffd);-webkit-background-clip:text;background-clip:text;color:transparent}
  .an-sub{font-size:15.5px;color:#4a5266;line-height:1.5;max-width:600px;margin:0 auto}
  .an-btns{display:flex;gap:13px;justify-content:center;margin-top:22px}
  .an-learn{background:#3b6cf6;color:#fff;border:none;border-radius:12px;padding:13px 22px;font-weight:700;font-size:14.5px;cursor:pointer}
  .an-skip{background:#fff;color:#3f4658;border:1px solid #cfd5e6;border-radius:12px;padding:13px 22px;font-weight:600;font-size:14.5px;cursor:pointer}
  .an-collage{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;max-width:1000px;margin:0 auto;padding-bottom:6px}
  .an-card{background:#fff;border:1px solid #eef0f6;border-radius:16px;padding:14px;
    box-shadow:0 16px 36px rgba(40,40,90,.08);opacity:0;transform:translateY(16px);animation:rise .55s ease forwards;
    transition:transform .2s ease, box-shadow .2s ease}
  .an-card:hover{transform:translateY(-6px);box-shadow:0 24px 50px rgba(40,40,90,.16)}
  .an-card:nth-child(1){animation-delay:.05s}.an-card:nth-child(2){animation-delay:.10s}
  .an-card:nth-child(3){animation-delay:.15s}.an-card:nth-child(4){animation-delay:.20s}
  .an-card:nth-child(5){animation-delay:.25s}.an-card:nth-child(6){animation-delay:.30s}
  .an-card:nth-child(7){animation-delay:.35s}.an-card:nth-child(8){animation-delay:.40s}
  @keyframes rise{to{opacity:1;transform:none}}
  .an-t{font-size:14px;font-weight:750;color:#1d2433;margin-bottom:10px}
  .an-viz{background:#f7f8fc;border-radius:11px;padding:12px;min-height:92px;position:relative;overflow:hidden}
  .an-bar{height:7px;border-radius:5px;background:#dde1ee;margin:6px 0}
  .an-bar.s{width:55%}.an-bar.m{width:78%}.an-bar.l{width:100%}
  .an-chip{display:inline-block;font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;background:#eef1fb;color:#5560a8;margin:2px 3px 0 0}
  .an-search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #e2e6f1;border-radius:8px;padding:7px 9px;margin-bottom:8px}
  .an-mag{width:12px;height:12px;border:2px solid #8a93ad;border-radius:50%;position:relative;flex:none}
  .an-mag::after{content:"";position:absolute;right:-4px;bottom:-2px;width:6px;height:2px;background:#8a93ad;transform:rotate(45deg)}
  .an-thumb{width:52px;height:40px;border-radius:8px;flex:none;background:linear-gradient(135deg,#dfe6ff,#f0e6ff);display:flex;align-items:center;justify-content:center}
  .an-play{width:0;height:0;border-left:11px solid #6d6af0;border-top:7px solid transparent;border-bottom:7px solid transparent}
  .an-bub{display:inline-block;padding:6px 10px;border-radius:12px;font-size:11px;background:#eef0f6;color:#3f4658}
  .an-capframe{height:66px;background:#e9ecf5;border-radius:8px;position:relative}
  .an-cap{position:absolute;left:8px;right:8px;bottom:8px;background:#1d2433;color:#fff;font-size:10px;padding:5px 8px;border-radius:7px;animation:capblink 2.4s ease-in-out infinite}
  @keyframes capblink{0%,100%{opacity:.85}50%{opacity:1}}
  .an-orb{width:44px;height:44px;border-radius:50%;margin:2px auto 8px;background:radial-gradient(circle at 35% 30%,#fff,#d8c6ff 45%,#9b6cff);animation:anglow 3s ease-in-out infinite}
  @keyframes anglow{0%,100%{box-shadow:0 0 0 0 rgba(155,108,255,.25)}50%{box-shadow:0 0 16px 5px rgba(155,108,255,.3)}}
  .an-slot{width:22px;height:32px;border-radius:6px;background:#e6e9f2;display:inline-block}
  .an-slot.ok{background:#c7edd8;border:1px solid #46b97e;animation:anpop 1.9s ease-in-out infinite}
  @keyframes anpop{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .an-node{position:absolute;width:15px;height:15px;border-radius:5px;background:#fff;border:1.5px solid #b9c2e6}
  .an-line{position:absolute;height:2px;background:#cfd6ee;transform-origin:left center}
  /* looping motifs */
  .an-viz{min-height:104px}
  .an-fill{height:7px;border-radius:5px;background:#cdd4ee;margin:7px 0;width:0;animation:anfill 2.8s ease-in-out infinite}
  .an-fill:nth-child(2){animation-delay:.3s}.an-fill:nth-child(3){animation-delay:.6s}
  @keyframes anfill{0%{width:0}45%{width:100%}82%{width:100%}100%{width:0}}
  .an-eq{display:flex;gap:4px;align-items:flex-end;height:24px;margin-top:10px}
  .an-eq i{width:5px;border-radius:3px;background:#7aa0ff;height:7px;animation:aneq .9s ease-in-out infinite}
  .an-eq i:nth-child(2){animation-delay:.15s}.an-eq i:nth-child(3){animation-delay:.3s}.an-eq i:nth-child(4){animation-delay:.45s}.an-eq i:nth-child(5){animation-delay:.6s}
  @keyframes aneq{0%,100%{height:6px}50%{height:22px}}
  .an-car{display:inline-block;width:2px;height:13px;background:#3b6cf6;vertical-align:middle;animation:ancar 1s steps(1) infinite}
  @keyframes ancar{50%{opacity:0}}
  .an-drift{animation:andrift 4.5s ease-in-out infinite}
  .an-drift:nth-child(2){animation-delay:1.2s}
  @keyframes andrift{0%,100%{transform:translateY(0);opacity:.78}50%{transform:translateY(-5px);opacity:1}}
  .an-pop{transform:scale(.5);opacity:0;animation:anpopin 3s ease-in-out infinite}
  .an-pop:nth-child(2){animation-delay:.5s}
  @keyframes anpopin{0%{transform:scale(.5);opacity:0}14%{transform:scale(1);opacity:1}72%{transform:scale(1);opacity:1}100%{transform:scale(.5);opacity:0}}
  .an-flow{position:relative;height:78px}
  .an-trav{position:absolute;width:8px;height:8px;border-radius:50%;background:#3b6cf6;box-shadow:0 0 0 3px rgba(59,108,246,.18);animation:antrav 2.8s linear infinite}
  @keyframes antrav{0%{left:18px;top:12px}33%{left:152px;top:12px}66%{left:84px;top:54px}100%{left:18px;top:12px}}
  .an-hl{animation:anhl 3s ease-in-out infinite}
  @keyframes anhl{0%,100%{transform:translateX(0)}50%{transform:translateX(-7px)}}
  @media(max-width:880px){.an-collage{grid-template-columns:repeat(2,1fr)}.an-h1{font-size:42px}}

  .dots{display:flex;gap:8px;justify-content:center;padding:12px 0 10px}
  .dots i{width:8px;height:8px;border-radius:50%;background:#cfd5e6;display:block;cursor:pointer}
  .dots i.on{width:24px;border-radius:8px;background:#4f5bff}

  .foot{background:rgba(255,255,255,.55);border-top:1px solid rgba(255,255,255,.7);
    margin:0 -28px;padding:14px 36px 16px;border-radius:0 0 30px 30px;display:grid;
    grid-template-columns:120px 1fr 120px;align-items:center;gap:20px}
  .foot .t{grid-column:2;text-align:center}
  .foot h2{font-size:22px;font-weight:800;background:linear-gradient(90deg,#4f5bff,#8a3ffd);
    -webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:5px}
  .foot p{font-size:13px;color:#3f4658;line-height:1.45;max-width:760px;margin:0 auto}
  .foot a.lm{color:#4f5bff;font-weight:600;text-decoration:none}
  .nav{display:inline-flex;align-items:center;justify-content:center;border:1px solid #cfd5e6;background:#fff;
    color:#3f4658;border-radius:12px;padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer;gap:6px;user-select:none}
  .nav.prev{grid-column:1} .nav.next{grid-column:3;background:#4f5bff;color:#fff;border-color:#4f5bff}
  .nav[disabled]{opacity:.4;cursor:default}
  @media(max-width:780px){.grid{grid-template-columns:repeat(2,1fr)}.card{grid-column:span 2 !important;grid-row:span 1 !important}.foot{grid-template-columns:1fr}.foot .t,.nav{grid-column:1}.prog{display:none}}

  /* fixed-size tour: content scrolls inside the stage instead of resizing the modal */
</style>
</head>
<body>
  <div class="bgdrop"></div>
  <div class="scrim"></div>
  <button class="reopen" id="reopen"><i></i>What’s new</button>
  <div class="modal">
    <div class="badge">Cliq 2026 <small>Product Tour</small></div>
    <div class="prog"><span id="pgtxt"><b>0</b> / 27 explored</span><div class="pgbar"><i id="pgfill"></i></div></div>
    <button class="close">×</button>
    <div id="stage"></div>
    <div class="dots" id="dots"></div>
    <div class="foot">
      <button class="nav prev" id="prev">← Prev</button>
      <div class="t"><h2 id="ft"></h2><p id="fp"></p></div>
      <button class="nav next" id="next">Next →</button>
    </div>
  </div>

<script>
const SLIDES = [
  { type:"welcome", title:"Welcome to Cliq 2026",
    desc:"This year, we went after the missing seconds, the moments between intention and action, where work feels harder than it needs to. Here’s what’s new in Cliq 2026. Take the tour, a few of the cards are live." },

  { title:"Built to give your time back",

let cur=0;
let detail=null;               // {s: slideIdx, c: cardIdx} when a feature is expanded
let capTimer=null;             // live-captions demo loop
const explored=new Set();      // "s-c" keys of features viewed
const TOTAL=SLIDES.reduce((n,s)=>n+(s.cards?s.cards.length:0),0);

const stage=document.getElementById('stage');
const dotsEl=document.getElementById('dots');
const ft=document.getElementById('ft'), fp=document.getElementById('fp');
const prev=document.getElementById('prev'), next=document.getElementById('next');
const pgtxt=document.getElementById('pgtxt'), pgfill=document.getElementById('pgfill');

/* ---------- live demos ---------- */
const DEMO_MSGS=[
  {who:"Priya", tag:"#launch", txt:"Launch checklist finalized, review by EOD"},
  {who:"Arun", tag:"#q3-okrs", txt:"Q3 OKRs updated with the new targets"},
  {who:"Meera", tag:"#launch", txt:"Landing page copy approved"},
  {who:"Dev", tag:"#design", txt:"New sidebar mockups attached"},
  {who:"Priya", tag:"#launch", txt:"Demo video uploaded to the channel"},
];
const CAP_LINES=[
  "…so the launch moves to Tuesday",
  "action item: Priya updates the checklist by noon",
  "captions and action items are saved automatically",
];

function demoHTML(kind){
  if(kind==="search")return `
  <div class="demo" onclick="event.stopPropagation()">
    <span class="demo-live">● TRY IT LIVE</span>
    <input oninput="demoFilter(this.value)" placeholder="Search messages… try “launch”">
    <div class="demo-chips">
      <span onclick="demoChip(this,'launch')">#launch</span>
      <span onclick="demoChip(this,'priya')">From: Priya</span>
      <span onclick="demoChip(this,'okr')">okr</span>
    </div>
    <div id="demoResults"></div>
  </div>`;
  if(kind==="replies")return `
  <div class="demo" onclick="event.stopPropagation()">
    <span class="demo-live">● TRY IT LIVE</span>
    <div class="demo-bub">Can we push the demo to 3 PM?</div>
    <div id="demoSent"></div>
    <div class="demo-qr" id="demoQR">
      <span onclick="demoReply('Works for me 👍')">Works for me 👍</span>
      <span onclick="demoReply('4 PM instead?')">4 PM instead?</span>
    </div>
    <div class="demo-hint">Tap a suggestion. That’s the whole flow.</div>
  </div>`;
  if(kind==="captions")return `
  <div class="demo" onclick="event.stopPropagation()">
    <span class="demo-live">● LIVE</span>
    <div class="capframe">
      <div class="capavs"><i></i><i></i><i></i></div>
      <div class="capbar"><span id="demoCap"></span><span class="an-car" style="background:#fff"></span></div>
    </div>
  </div>`;
  return "";
}
function demoFilter(q){
  const box=document.getElementById('demoResults'); if(!box)return;
  q=(q||"").toLowerCase().replace("#","");
  const hits=DEMO_MSGS.filter(m=>!q||m.txt.toLowerCase().includes(q)||m.who.toLowerCase().includes(q)||m.tag.replace("#","").includes(q));
  box.innerHTML = hits.length
    ? hits.slice(0,3).map(m=>`<div class="dres"><b>${m.who}</b><span class="rtag">${m.tag}</span><br>${m.txt}</div>`).join("")
    : `<div class="dres">No matches, try “launch”</div>`;
}
function demoChip(el,q){
  const inp=el.closest('.demo').querySelector('input');
  if(inp){inp.value=q;} demoFilter(q);
}
function demoReply(txt){
  const sent=document.getElementById('demoSent'); if(!sent)return;
  sent.innerHTML=`<div class="demo-bub out">${txt}</div><div class="demo-note">Sent in one tap ⚡</div>`;
  const qr=document.getElementById('demoQR'); if(qr)qr.style.display='none';
  const hint=document.querySelector('.demo-hint'); if(hint)hint.style.display='none';
}
function startCaps(){
  const el=document.getElementById('demoCap'); if(!el)return;
  let li=0, wi=0;
  capTimer=setInterval(()=>{
    const words=CAP_LINES[li].split(" ");
    wi++;
    if(wi>words.length+5){wi=0;li=(li+1)%CAP_LINES.length;}
    el.textContent=words.slice(0,Math.min(wi,words.length)).join(" ");
  },220);
}
function initDemos(){
  if(document.getElementById('demoResults'))demoFilter('');
  if(document.getElementById('demoCap'))startCaps();
}

/* ---------- render ---------- */
function render(){
  if(capTimer){clearInterval(capTimer);capTimer=null;}
  const s=SLIDES[cur];
  let html="";
  if(detail){
    html=buildDetail(detail.s, detail.c);
  } else if(s.type==="welcome"){
    html=buildWelcome(s);
  } else if(s.type==="closing"){
    const pct=Math.round(explored.size/TOTAL*100);
    html=`<div class="center"><h1>${s.title}</h1><p>${s.desc}</p>
      <div class="progress">You’ve explored <b>${explored.size} of ${TOTAL}</b> new features
        <div class="pbar"><i style="width:${pct}%"></i></div></div>
      <div class="ctaBtns"><a class="primary" href="#">Get started</a><a class="ghost" href="#">View release notes</a></div></div>`;
  } else {
    html=`<div class="grid">`+ s.cards.map((c,i)=>`
      <div class="card" style="grid-column:span ${c.c};grid-row:span ${c.r}" onclick="openDetail(${cur},${i})">
        ${explored.has(cur+'-'+i)?'<span class="seen">✓</span>':''}
        <span class="go">›</span>
        <div class="chead"><h3>${c.h}</h3><div class="sub">${c.t}</div></div>
        ${c.demo? demoHTML(c.demo) : `
        <div class="shot">
          <img src="${c.f}" alt="${c.t}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="ph" style="display:none"><b>${c.f}</b><span>${c.d}</span></div>
        </div>`}
      </div>`).join("") + `</div>`;
  }
  stage.innerHTML=html;
  if(detail){
    const ds=SLIDES[detail.s], c=ds.cards[detail.c];
    ft.textContent=c.t;
    fp.innerHTML=`Feature ${detail.c+1} of ${ds.cards.length} in “${ds.title}”`;
  } else {
    ft.textContent=s.title;
    fp.innerHTML=s.desc + (s.type? "" : ' <a class="lm" href="#">Learn More</a>');
  }
  dotsEl.innerHTML=SLIDES.map((_,i)=>`<i class="${i===cur?'on':''}" onclick="go(${i})"></i>`).join("");
  prev.disabled = !detail && cur===0;
  next.disabled = !detail && cur===SLIDES.length-1;
  pgtxt.innerHTML=`<b>${explored.size}</b> / ${TOTAL} explored`;
  pgfill.style.width=Math.round(explored.size/TOTAL*100)+"%";
  document.querySelector('.prog').style.display = (!detail && s.type==="welcome") ? 'none' : '';
  initDemos();
}

function buildDetail(si,ci){
  const s=SLIDES[si], c=s.cards[ci];
  const media = c.demo? demoHTML(c.demo) : `
        <img src="${c.f}" alt="${c.t}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="ph" style="display:none"><b>${c.f}</b><span>${c.d}</span></div>`;
  return `
  <div class="detail">
    <button class="dback" onclick="closeDetail()">← All features</button>
    <div class="dwrap">
      <div class="dshot">${media}</div>
      <div class="dinfo">
        <div class="dtags"><span class="dtag">${c.t}</span>${c.badge?`<span class="dtag warn">${c.badge}</span>`:""}</div>
        <h2>${c.h}</h2>
        <p>${c.long}</p>
        ${c.note?`<div class="dnote">ⓘ ${c.note}</div>`:""}
        <div class="dbtns"><a class="primary" href="#">Try it now</a><a class="ghost" href="#">Learn more</a></div>
      </div>
    </div>
  </div>`;
}

function openDetail(si,ci){ detail={s:si,c:ci}; explored.add(si+'-'+ci); render(); }
function closeDetail(){ detail=null; render(); }
function skip(){ go(SLIDES.length-1); }

    <p class="an-sub">${s.desc}</p>
  </div>
  <div class="an-collage">
    <div class="an-card"><div class="an-t">Advanced Search &amp; Hashtags</div>
      <div class="an-viz">
        <div class="an-search"><span class="an-mag"></span><span style="font-size:11px;color:#8a93ad">website redesign</span><span class="an-car"></span></div>
        <div class="an-bar l"></div><div class="an-bar m"></div>
        <div style="margin-top:8px"><span class="an-chip an-drift">#launch</span><span class="an-chip an-drift">#q3-okrs</span></div>

    </div>
    <div class="an-card"><div class="an-t">Multimedia Summaries</div>

        <div style="margin-top:10px"><span class="an-chip an-pop" style="background:#eaf0ff;color:#3b6cf6">I’m great, you?</span><span class="an-chip an-pop" style="background:#eaf0ff;color:#3b6cf6">Sure</span></div>

    </div>

      <div class="an-viz">
        <div class="an-capframe" style="height:46px"><div class="an-cap">“…stay inside the conversation”</div></div>
        <div class="an-eq"><i></i><i></i><i></i><i></i><i></i></div>
      </div>
    </div>
    <div class="an-card"><div class="an-t">Slot Suggestions</div>
      <div class="an-viz" style="display:flex;align-items:center;justify-content:center;gap:6px">

        <div class="an-bar l" style="margin-top:10px"></div><div class="an-bar m"></div><div class="an-bar s"></div>
      </div>
    </div>
    <div class="an-card"><div class="an-t">No-Code Bot Builder</div>
      <div class="an-viz"><div class="an-flow">
        <span class="an-line" style="left:28px;top:18px;width:64px;transform:rotate(24deg)"></span>
        <span class="an-line" style="left:96px;top:58px;width:64px;transform:rotate(-24deg)"></span>

      <div class="an-viz" style="display:flex;gap:9px">
        <div style="width:7px;border-radius:4px;background:#dde1ee"></div>
        <div style="flex:1"><div class="an-bar l"></div><div class="an-bar m an-hl" style="background:#c9d2ff"></div><div class="an-bar l"></div><div class="an-bar s"></div></div>

function go(i){detail=null;cur=Math.max(0,Math.min(SLIDES.length-1,i));render();}
function nextStep(){
  if(detail){
    const s=SLIDES[detail.s];
    if(detail.c < s.cards.length-1){ openDetail(detail.s, detail.c+1); }
    else { const si=detail.s; detail=null; go(si+1); }
  } else { go(cur+1); }
}
function prevStep(){
  if(detail){
    if(detail.c > 0){ openDetail(detail.s, detail.c-1); }
    else { closeDetail(); }
  } else { go(cur-1); }
}
prev.onclick=prevStep;
next.onclick=nextStep;
const modalEl=document.querySelector('.modal'), scrimEl=document.querySelector('.scrim'),
      bgEl=document.querySelector('.bgdrop'), reopenBtn=document.getElementById('reopen');
function closeTour(){
  modalEl.style.display='none'; scrimEl.style.display='none';
  bgEl.style.filter='none'; reopenBtn.style.display='inline-flex';
  if(capTimer){clearInterval(capTimer);capTimer=null;}
}
function openTour(){
  modalEl.style.display=''; scrimEl.style.display='';
  bgEl.style.filter=''; reopenBtn.style.display='none';
  render();
}
document.querySelector('.close').onclick=()=>{ if(detail){ closeDetail(); } else { closeTour(); } };
reopenBtn.onclick=openTour;
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Escape'&&detail){closeDetail();return;}
  if(e.key==='ArrowRight'){nextStep();}
  if(e.key==='ArrowLeft'){prevStep();}
});
render();
</script>
</body>
</html>
